<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenGoose Dashboard</title>
  <link rel="stylesheet" href="/pico.min.css">
  <script defer src="/alpine.min.js"></script>
  <style>
    :root { --pico-font-size: 15px; }
    .kanban { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
    .kanban-col h3 { font-size: 1rem; margin-bottom: .5rem; }
    .kanban-col h3 small { font-weight: 400; opacity: .5; }
    .card { border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); padding: .75rem; margin-bottom: .5rem; cursor: pointer; transition: border-color .15s; }
    .card:hover { border-color: var(--pico-primary); }
    .card small { opacity: .7; }
    .card-desc { font-size: .8rem; opacity: .8; margin-top: .25rem; }
    .card-meta { display: flex; gap: .5rem; align-items: center; margin-top: .35rem; flex-wrap: wrap; }
    .badge { display: inline-block; padding: .1rem .4rem; border-radius: 4px; font-size: .75rem; font-weight: 600; }
    .badge-p0 { background: #e74c3c; color: #fff; }
    .badge-p1 { background: #3498db; color: #fff; }
    .badge-p2 { background: #7f8c8d; color: #fff; }
    .badge-trust { font-size: .65rem; padding: .05rem .3rem; border-radius: 3px; background: var(--pico-muted-border-color); }
    .badge-trust-l2 { background: #27ae60; color: #fff; }
    .badge-trust-l3 { background: #8e44ad; color: #fff; }
    .tag { display: inline-block; padding: .05rem .35rem; border-radius: 3px; font-size: .7rem; background: var(--pico-muted-border-color); margin-right: .2rem; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: .3rem; }
    .dot-open { background: #2ecc71; }
    .dot-claimed { background: #f39c12; }
    .dot-done { background: #95a5a6; }
    .dot-stuck { background: #e74c3c; }
    .dot-abandoned { background: #7f8c8d; }
    nav .brand { font-weight: 700; }
    .trust-bar { display: inline-block; width: 60px; height: 8px; background: var(--pico-muted-border-color); border-radius: 4px; overflow: hidden; vertical-align: middle; }
    .trust-fill { height: 100%; background: #2ecc71; }
    .stats { display: flex; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .stat-num { font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: .75rem; opacity: .7; }
    .empty-guide { text-align: center; padding: 2rem; opacity: .6; }
    .empty-guide code { font-size: .85rem; }
    .show-all-btn { font-size: .75rem; opacity: .6; cursor: pointer; text-align: center; padding: .25rem; }
    .show-all-btn:hover { opacity: 1; }
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .detail-panel { background: var(--pico-card-background-color); border-radius: var(--pico-border-radius); padding: 1.5rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .detail-panel h3 { margin-top: 0; }
    .detail-field { margin-bottom: .5rem; }
    .detail-field label { font-size: .75rem; opacity: .6; display: block; }
    .rig-tag { display: inline-block; padding: .05rem .35rem; border-radius: 3px; font-size: .7rem; background: var(--pico-muted-border-color); margin-right: .2rem; margin-bottom: .2rem; }
    .filter-bar { display: flex; gap: .75rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filter-bar select { width: auto; padding: .3rem .5rem; font-size: .85rem; margin-bottom: 0; }
    .filter-bar input[type="search"] { width: 200px; padding: .3rem .5rem; font-size: .85rem; margin-bottom: 0; }
    .filter-count { font-size: .8rem; opacity: .6; }
    .post-btn { padding: .3rem .7rem; font-size: .85rem; margin-bottom: 0; cursor: pointer; }
    .claim-btn { margin-top: .75rem; }
    .error-msg { color: #e74c3c; font-size: .85rem; margin-top: .5rem; }
    .form-row { margin-bottom: .75rem; }
    .form-row label { font-size: .85rem; display: block; margin-bottom: .25rem; }
    .form-row input, .form-row textarea, .form-row select { font-size: .85rem; }
    .form-row textarea { min-height: 80px; }
  </style>
</head>
<body>
  <div x-data="dashboard()" x-init="init()">
    <nav class="container-fluid">
      <ul>
        <li><strong class="brand">OpenGoose</strong></li>
      </ul>
      <ul>
        <li><a href="#" :class="page === 'board' && 'contrast'" @click.prevent="page='board'">Board</a></li>
        <li><a href="#" :class="page === 'rigs' && 'contrast'" @click.prevent="page='rigs'">Rigs</a></li>
        <li><small x-text="connected ? '● connected' : '○ disconnected'" :style="connected ? 'color:#2ecc71' : 'color:#e74c3c'"></small></li>
      </ul>
    </nav>

    <main class="container">
      <!-- Loading -->
      <p x-show="loading" aria-busy="true">Loading...</p>

      <!-- Board View -->
      <template x-if="page === 'board' && !loading">
        <div>
          <template x-if="items.length === 0">
            <div class="empty-guide">
              <p>Board is empty.</p>
              <button class="post-btn" @click="showPostModal = true">+ Post your first task</button>
            </div>
          </template>

          <template x-if="items.length > 0">
            <div>
              <!-- Filter bar -->
              <div class="filter-bar">
                <button class="post-btn" @click="showPostModal = true">+ Post</button>
                <select x-model="filterStatus">
                  <option value="">all statuses</option>
                  <option value="Open">Open</option>
                  <option value="Claimed">Claimed</option>
                  <option value="Done">Done</option>
                  <option value="Stuck">Stuck</option>
                  <option value="Abandoned">Abandoned</option>
                </select>
                <select x-model="filterPriority">
                  <option value="">all priorities</option>
                  <option value="P0">P0</option>
                  <option value="P1">P1</option>
                  <option value="P2">P2</option>
                </select>
                <select x-model="sortOrder">
                  <option value="priority">priority</option>
                  <option value="newest">newest</option>
                  <option value="oldest">oldest</option>
                  <option value="alpha">alpha</option>
                </select>
                <input type="search" placeholder="search..." x-model.debounce.200ms="searchQuery">
                <span class="filter-count" x-text="filteredItems().length + ' / ' + items.length + ' items'"></span>
              </div>

              <div class="stats">
                <div><span class="stat-num" x-text="countByStatus('Open')"></span><br><span class="stat-label">Open</span></div>
                <div><span class="stat-num" x-text="countByStatus('Claimed')"></span><br><span class="stat-label">Claimed</span></div>
                <div><span class="stat-num" x-text="countByStatus('Done')"></span><br><span class="stat-label">Done</span></div>
                <div><span class="stat-num" x-text="countByStatus('Stuck')"></span><br><span class="stat-label">Stuck</span></div>
                <div><span class="stat-num" x-text="countByStatus('Abandoned')"></span><br><span class="stat-label">Abandoned</span></div>
              </div>

              <div class="kanban">
                <template x-for="col in visibleColumns()" :key="col">
                  <div class="kanban-col">
                    <h3>
                      <span class="status-dot" :class="'dot-' + col.toLowerCase()"></span>
                      <span x-text="col"></span>
                      <small x-text="'(' + columnItems(col).length + ')'"></small>
                    </h3>
                    <template x-for="item in displayItems(col)" :key="item.id">
                      <div class="card" @click="selectedItem = item">
                        <div>
                          <span class="badge" :class="'badge-' + item.priority.toLowerCase()" x-text="item.priority"></span>
                          <strong x-text="'#' + item.id"></strong>
                          <span x-text="item.title"></span>
                        </div>
                        <p x-show="item.description" class="card-desc" x-text="item.description"></p>
                        <div class="card-meta">
                          <template x-for="tag in item.tags" :key="tag">
                            <span class="tag" x-text="tag"></span>
                          </template>
                          <small x-text="'by ' + (item.created_by || '')"></small>
                          <small x-show="item.claimed_by" x-text="'→ ' + (item.claimed_by || '')"></small>
                          <small x-text="relTime(item.updated_at)"></small>
                        </div>
                      </div>
                    </template>
                    <div x-show="columnItems(col).length > 10 && (col === 'Done' || col === 'Abandoned') && !showAll[col]"
                         class="show-all-btn" @click="showAll[col] = true"
                         x-text="'show all ' + columnItems(col).length + ' items'"></div>
                    <p x-show="columnItems(col).length === 0"><small>empty</small></p>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Rigs View -->
      <template x-if="page === 'rigs' && !loading">
        <div>
          <h2>Registered Rigs</h2>
          <template x-if="rigs.length === 0">
            <div class="empty-guide">
              <p>No rigs registered.</p>
              <code>opengoose rigs add --id dev-01 --recipe developer --tags rust</code>
            </div>
          </template>
          <table x-show="rigs.length > 0">
            <thead>
              <tr><th>ID</th><th>Type</th><th>Recipe</th><th>Tags</th><th>Trust</th><th>Score</th></tr>
            </thead>
            <tbody>
              <template x-for="rig in rigs" :key="rig.id">
                <tr>
                  <td x-text="rig.id"></td>
                  <td x-text="rig.rig_type"></td>
                  <td x-text="rig.recipe || '—'"></td>
                  <td>
                    <template x-for="tag in parseTags(rig.tags)" :key="tag">
                      <span class="rig-tag" x-text="tag"></span>
                    </template>
                    <span x-show="parseTags(rig.tags).length === 0">—</span>
                  </td>
                  <td x-text="rig.trust_level"></td>
                  <td>
                    <span x-text="rig.trust_score.toFixed(1)"></span>
                    <span class="trust-bar"><span class="trust-fill" :style="'width:' + Math.min(100, Math.max(0, (rig.trust_score / 50) * 100)) + '%'"></span></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>

      <!-- Detail overlay -->
      <template x-if="selectedItem">
        <div class="detail-overlay" @click.self="selectedItem = null" @keydown.escape.window="selectedItem = null">
          <div class="detail-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <h3 x-text="'#' + selectedItem.id + ' ' + selectedItem.title" style="margin:0;"></h3>
              <a href="#" @click.prevent="selectedItem = null" style="opacity:.5;">✕</a>
            </div>
            <hr>
            <div class="detail-field">
              <label>Status</label>
              <span class="status-dot" :class="'dot-' + selectedItem.status.toLowerCase()"></span>
              <span x-text="selectedItem.status"></span>
              <span class="badge" :class="'badge-' + selectedItem.priority.toLowerCase()" x-text="selectedItem.priority" style="margin-left:.5rem;"></span>
            </div>
            <div class="detail-field" x-show="selectedItem.description">
              <label>Description</label>
              <span x-text="selectedItem.description"></span>
            </div>
            <div class="detail-field">
              <label>Created by</label>
              <span x-text="selectedItem.created_by"></span>
              <small x-text="relTime(selectedItem.created_at)"></small>
            </div>
            <div class="detail-field" x-show="selectedItem.claimed_by">
              <label>Claimed by</label>
              <span x-text="selectedItem.claimed_by"></span>
            </div>
            <div class="detail-field" x-show="selectedItem.tags && selectedItem.tags.length > 0">
              <label>Tags</label>
              <template x-for="tag in (selectedItem.tags || [])" :key="tag">
                <span class="tag" x-text="tag"></span>
              </template>
            </div>
            <div class="detail-field">
              <label>Updated</label>
              <span x-text="relTime(selectedItem.updated_at)"></span>
            </div>
            <template x-if="selectedItem.status === 'Open'">
              <div class="claim-btn">
                <label style="font-size:.85rem;">Claim as:</label>
                <div style="display:flex; gap:.5rem; align-items:center;">
                  <input type="text" x-model="claimRigId" placeholder="rig id" style="font-size:.85rem; margin-bottom:0; width:150px;">
                  <button @click="claimItem()" :disabled="!claimRigId || claimLoading" :aria-busy="claimLoading" style="font-size:.85rem; margin-bottom:0;">Claim</button>
                </div>
                <p x-show="claimError" class="error-msg" x-text="claimError"></p>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Post modal -->
      <template x-if="showPostModal">
        <div class="detail-overlay" @click.self="showPostModal = false" @keydown.escape.window="showPostModal = false">
          <div class="detail-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <h3 style="margin:0;">Post Work Item</h3>
              <a href="#" @click.prevent="showPostModal = false" style="opacity:.5;">✕</a>
            </div>
            <hr>
            <div class="form-row">
              <label>Title *</label>
              <input type="text" x-model="postForm.title" placeholder="What needs to be done?">
            </div>
            <div class="form-row">
              <label>Description</label>
              <textarea x-model="postForm.description" placeholder="Details, acceptance criteria..."></textarea>
            </div>
            <div class="form-row">
              <label>Priority</label>
              <select x-model="postForm.priority">
                <option value="P0">P0</option>
                <option value="P1" selected>P1</option>
                <option value="P2">P2</option>
              </select>
            </div>
            <div class="form-row">
              <label>Posted by</label>
              <input type="text" x-model="postForm.created_by" placeholder="rig id">
            </div>
            <div class="form-row">
              <label>Tags (comma-separated)</label>
              <input type="text" x-model="postForm.tagsRaw" placeholder="rust, backend">
            </div>
            <button @click="submitPost()" :disabled="!postForm.title.trim() || postLoading" :aria-busy="postLoading">Post</button>
            <p x-show="postError" class="error-msg" x-text="postError"></p>
          </div>
        </div>
      </template>
    </main>
  </div>

  <script>
    function dashboard() {
      return {
        page: 'board',
        items: [],
        rigs: [],
        connected: false,
        loading: true,
        es: null,
        selectedItem: null,
        showAll: {},
        reconnectDelay: 3000,
        filterStatus: '',
        filterPriority: '',
        sortOrder: 'priority',
        searchQuery: '',
        showPostModal: false,
        postForm: { title: '', description: '', priority: 'P1', created_by: 'web', tagsRaw: '' },
        postLoading: false,
        postError: '',
        claimRigId: '',
        claimLoading: false,
        claimError: '',

        async init() {
          await Promise.all([this.fetchBoard(), this.fetchRigs()]);
          this.loading = false;
          this.connectSSE();
        },

        async fetchBoard() {
          try {
            const res = await fetch('/api/board');
            this.items = await res.json();
          } catch (e) { console.error('fetch board failed', e); }
        },

        async fetchRigs() {
          try {
            const res = await fetch('/api/rigs');
            this.rigs = await res.json();
          } catch (e) { console.error('fetch rigs failed', e); }
        },

        connectSSE() {
          if (this.es) { this.es.close(); }
          this.reconnectDelay = 3000;
          this.es = new EventSource('/api/events');
          this.es.onopen = () => { this.connected = true; this.reconnectDelay = 3000; };
          this.es.onerror = () => {
            this.connected = false;
            this.es.close();
            const delay = this.reconnectDelay;
            this.reconnectDelay = Math.min(delay * 2, 30000);
            setTimeout(() => this.connectSSE(), delay);
          };
          this.es.addEventListener('board_changed', () => {
            this.fetchBoard();
            this.fetchRigs();
          });
        },

        filteredItems() {
          const q = this.searchQuery.toLowerCase();
          return this.items.filter(i => {
            if (this.filterStatus && i.status !== this.filterStatus) return false;
            if (this.filterPriority && i.priority !== this.filterPriority) return false;
            if (q) {
              const haystack = (
                i.title + ' ' + (i.description || '') + ' ' +
                (i.tags || []).join(' ') + ' ' +
                (i.created_by || '') + ' ' + (i.claimed_by || '')
              ).toLowerCase();
              if (!haystack.includes(q)) return false;
            }
            return true;
          });
        },

        sortItems(arr) {
          return [...arr].sort((a, b) => {
            if (this.sortOrder === 'priority') return priorityOrd(a.priority) - priorityOrd(b.priority);
            if (this.sortOrder === 'newest') return new Date(b.created_at) - new Date(a.created_at);
            if (this.sortOrder === 'oldest') return new Date(a.created_at) - new Date(b.created_at);
            if (this.sortOrder === 'alpha') return a.title.localeCompare(b.title);
            return 0;
          });
        },

        countByStatus(status) {
          return this.items.filter(i => i.status === status).length;
        },

        visibleColumns() {
          if (this.filterStatus) return [this.filterStatus];
          return ['Open', 'Claimed', 'Stuck', 'Done', 'Abandoned'];
        },

        columnItems(col) {
          return this.sortItems(this.filteredItems().filter(i => i.status === col));
        },

        displayItems(col) {
          const all = this.columnItems(col);
          if ((col === 'Done' || col === 'Abandoned') && !this.showAll[col]) {
            return all.slice(0, 10);
          }
          return all;
        },

        parseTags(tagsJson) {
          if (!tagsJson) return [];
          try { return JSON.parse(tagsJson); } catch { return []; }
        },

        async submitPost() {
          this.postError = '';
          this.postLoading = true;
          try {
            const tags = this.postForm.tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
            const res = await fetch('/api/board', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                title: this.postForm.title.trim(),
                description: this.postForm.description.trim(),
                priority: this.postForm.priority,
                created_by: this.postForm.created_by.trim() || 'web',
                tags,
              }),
            });
            if (!res.ok) throw new Error('Failed to post (' + res.status + ')');
            this.showPostModal = false;
            this.postForm = { title: '', description: '', priority: 'P1', created_by: 'web', tagsRaw: '' };
            await this.fetchBoard();
          } catch (e) { this.postError = e.message; }
          this.postLoading = false;
        },

        async claimItem() {
          this.claimError = '';
          this.claimLoading = true;
          try {
            const res = await fetch('/api/board/' + this.selectedItem.id + '/claim', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ rig_id: this.claimRigId.trim() }),
            });
            if (!res.ok) {
              if (res.status === 409) throw new Error('Already claimed');
              if (res.status === 404) throw new Error('Item not found');
              throw new Error('Failed to claim (' + res.status + ')');
            }
            const updated = await res.json();
            this.selectedItem = updated;
            await this.fetchBoard();
          } catch (e) { this.claimError = e.message; }
          this.claimLoading = false;
        },

        relTime(iso) {
          if (!iso) return '';
          const diff = Date.now() - new Date(iso).getTime();
          const mins = Math.floor(diff / 60000);
          if (mins < 1) return 'just now';
          if (mins < 60) return mins + 'm ago';
          const hrs = Math.floor(mins / 60);
          if (hrs < 24) return hrs + 'h ago';
          const days = Math.floor(hrs / 24);
          if (days < 30) return days + 'd ago';
          return new Date(iso).toLocaleDateString();
        }
      };
    }

    function priorityOrd(p) {
      return p === 'P0' ? 0 : p === 'P1' ? 1 : 2;
    }
  </script>
</body>
</html>
