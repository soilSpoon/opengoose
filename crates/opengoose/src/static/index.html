<!DOCTYPE html>
<html lang="en" x-data x-bind:data-theme="$store.theme.mode">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenGoose Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    :root {
      --pico-font-size: 15px;
      --color-open: #2ecc71; --color-claimed: #f39c12;
      --color-done: #95a5a6; --color-stuck: #e74c3c; --color-abandoned: #7f8c8d;
      --color-p0: #e74c3c; --color-p1: #3498db; --color-p2: #7f8c8d;
    }
    .kanban { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
    .kanban-col h3 { font-size: 1rem; margin-bottom: .5rem; }
    .kanban-col h3 small { font-weight: 400; opacity: .5; }
    .kanban-col article { cursor: pointer; }
    .kanban-col article footer { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
    .kanban-col article footer small { opacity: .7; }
    kbd[data-p="P0"] { background: var(--color-p0); }
    kbd[data-p="P1"] { background: var(--color-p1); }
    kbd[data-p="P2"] { background: var(--color-p2); }
    kbd.tag { font-size: .7rem; font-weight: 400; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: .3rem; }
    .dot-open { background: var(--color-open); }
    .dot-claimed { background: var(--color-claimed); }
    .dot-done { background: var(--color-done); }
    .dot-stuck { background: var(--color-stuck); }
    .dot-abandoned { background: var(--color-abandoned); }
    .stats { display: flex; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .stats hgroup { margin-bottom: 0; }
    .stats hgroup h2 { margin-bottom: 0; font-size: 1.5rem; }
    .stats hgroup p { font-size: .75rem; margin-bottom: 0; }
    .filter-bar { display: flex; gap: .75rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filter-bar select, .filter-bar input[type="search"] { width: auto; padding: .3rem .5rem; font-size: .85rem; margin-bottom: 0; }
    .filter-bar input[type="search"] { width: 200px; }
    .filter-bar small { opacity: .6; }
    .show-all-btn { font-size: .75rem; opacity: .6; cursor: pointer; text-align: center; padding: .25rem; }
    .show-all-btn:hover { opacity: 1; }
    dialog article { max-width: 500px; width: 90vw; }
    dialog article header a { opacity: .5; }
    dialog .field label { font-size: .75rem; opacity: .6; }
    mark[data-tier="L1"] { background: #7f8c8d; color: #fff; }
    mark[data-tier="L1.5"] { background: #f39c12; color: #fff; }
    mark[data-tier="L2"] { background: #27ae60; color: #fff; }
    mark[data-tier="L2.5"] { background: #2980b9; color: #fff; }
    mark[data-tier="L3"] { background: #8e44ad; color: #fff; }
    .dim-scores { display: flex; gap: 1rem; flex-wrap: wrap; }
    .dim-scores div { flex: 1; min-width: 80px; }
    .dim-scores label { font-size: .75rem; opacity: .6; display: block; }
    .dim-scores span { font-size: 1.1rem; font-weight: 600; }
    .rig-row { cursor: pointer; }
    .rig-row:hover { background: var(--pico-muted-border-color); }
    /* Skills */
    .skill-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .skill-card { cursor: pointer; position: relative; }
    .skill-card:hover { outline: 1px solid var(--pico-primary); }
    .skill-card footer { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
    kbd.scope { font-size: .7rem; font-weight: 400; }
    kbd.lifecycle-active { background: #27ae60; color: #fff; }
    kbd.lifecycle-dormant { background: #f39c12; color: #fff; }
    kbd.lifecycle-archived { background: #7f8c8d; color: #fff; }
    kbd.scope-installed { background: #3498db; color: #fff; }
    kbd.scope-learned { background: #8e44ad; color: #fff; }
    .eff-chart { display: flex; align-items: flex-end; gap: 2px; height: 24px; margin-top: .25rem; }
    .eff-bar { width: 8px; min-height: 2px; border-radius: 1px; }
    .eff-baseline { border-bottom: 1px dashed var(--pico-muted-color); width: 100%; position: absolute; left: 0; }
    .skill-scope-group { margin-bottom: 1.5rem; }
    .skill-scope-group h3 { font-size: 1rem; margin-bottom: .5rem; border-bottom: 1px solid var(--pico-muted-border-color); padding-bottom: .25rem; }
    .skill-content-preview { white-space: pre-wrap; font-size: .8rem; max-height: 400px; overflow-y: auto; background: var(--pico-card-background-color); padding: 1rem; border-radius: var(--pico-border-radius); border: 1px solid var(--pico-muted-border-color); }
    .skill-meta-grid { display: grid; grid-template-columns: auto 1fr; gap: .25rem .75rem; font-size: .85rem; }
    .skill-meta-grid dt { opacity: .6; }
  </style>
</head>
<body>
  <div x-cloak x-data="dashboard()" x-init="init()" @keydown.escape.window="selectedItem = null; showPostModal = false; rigDetail = null; skillDetail = null">
    <nav class="container-fluid">
      <ul>
        <li><strong>OpenGoose</strong></li>
      </ul>
      <ul>
        <li><a href="#" :class="$store.nav.page === 'board' && 'contrast'" @click.prevent="$store.nav.page='board'">Board</a></li>
        <li><a href="#" :class="$store.nav.page === 'rigs' && 'contrast'" @click.prevent="$store.nav.page='rigs'">Rigs</a></li>
        <li><a href="#" :class="$store.nav.page === 'skills' && 'contrast'" @click.prevent="$store.nav.page='skills'">Skills</a></li>
        <li><small x-text="connected ? '● connected' : '○ disconnected'" :style="connected ? 'color:var(--color-open)' : 'color:var(--color-stuck)'"></small></li>
        <li>
          <label data-tooltip="Toggle dark/light mode" data-placement="bottom" style="margin-bottom:0; cursor:pointer;">
            <input type="checkbox" role="switch" :checked="$store.theme.mode === 'dark'" @change="$store.theme.toggle()" style="margin-bottom:0;">
          </label>
        </li>
      </ul>
    </nav>

    <main class="container">
      <!-- Loading -->
      <p x-show="loading" aria-busy="true">Loading...</p>

      <!-- Board View -->
      <template x-if="$store.nav.page === 'board' && !loading">
        <div>
          <template x-if="items.length === 0">
            <section style="text-align:center; padding:2rem;">
              <p>Board is empty.</p>
              <button @click="showPostModal = true">+ Post your first task</button>
            </section>
          </template>

          <template x-if="items.length > 0">
            <div>
              <!-- Filter bar -->
              <div class="filter-bar">
                <button class="outline" @click="showPostModal = true" style="padding:.3rem .7rem; margin-bottom:0;">+ Post</button>
                <fieldset role="group" style="margin-bottom:0;">
                  <select x-model="$store.filters.status">
                    <option value="">all statuses</option>
                    <option value="Open">Open</option>
                    <option value="Claimed">Claimed</option>
                    <option value="Done">Done</option>
                    <option value="Stuck">Stuck</option>
                    <option value="Abandoned">Abandoned</option>
                  </select>
                  <select x-model="$store.filters.priority">
                    <option value="">all priorities</option>
                    <option value="P0">P0</option>
                    <option value="P1">P1</option>
                    <option value="P2">P2</option>
                  </select>
                  <select x-model="$store.filters.sort">
                    <option value="priority">priority</option>
                    <option value="newest">newest</option>
                    <option value="oldest">oldest</option>
                    <option value="alpha">alpha</option>
                  </select>
                </fieldset>
                <input type="search" placeholder="search..." x-model.debounce.200ms="$store.filters.q">
                <small x-text="filteredItems().length + ' / ' + items.length + ' items'"></small>
              </div>

              <div class="stats">
                <template x-for="s in ['Open','Claimed','Done','Stuck','Abandoned']" :key="s">
                  <hgroup>
                    <h2 x-text="countByStatus(s)"></h2>
                    <p x-text="s"></p>
                  </hgroup>
                </template>
              </div>

              <div class="kanban">
                <template x-for="col in visibleColumns()" :key="col">
                  <div class="kanban-col">
                    <h3>
                      <span class="status-dot" :class="'dot-' + col.toLowerCase()"></span>
                      <span x-text="col"></span>
                      <small x-text="'(' + columnItems(col).length + ')'"></small>
                    </h3>
                    <template x-for="item in displayItems(col)" :key="item.id">
                      <article @click="selectedItem = item" x-intersect.once="$el.style.opacity = 1" style="opacity:0; transition:opacity .3s;">
                        <div>
                          <kbd :data-p="item.priority" x-text="item.priority"></kbd>
                          <strong x-text="'#' + item.id"></strong>
                          <span x-text="item.title"></span>
                        </div>
                        <details x-show="item.description" @click.stop style="font-size:.8rem; opacity:.8; margin-top:.25rem;">
                          <summary>description</summary>
                          <p x-text="item.description"></p>
                        </details>
                        <footer>
                          <template x-for="tag in item.tags" :key="tag">
                            <kbd class="tag" x-text="tag"></kbd>
                          </template>
                          <small x-text="'by ' + (item.created_by || '')"></small>
                          <small x-show="item.claimed_by" x-text="'→ ' + (item.claimed_by || '')"></small>
                          <small x-text="relTime(item.updated_at)"></small>
                        </footer>
                      </article>
                    </template>
                    <div x-show="(col === 'Done' || col === 'Abandoned') && columnItems(col).length > 10">
                      <div x-show="showAll[col]" x-collapse>
                        <template x-for="item in columnItems(col).slice(10)" :key="item.id">
                          <article @click="selectedItem = item" x-intersect.once="$el.style.opacity = 1" style="opacity:0; transition:opacity .3s;">
                            <div>
                              <kbd :data-p="item.priority" x-text="item.priority"></kbd>
                              <strong x-text="'#' + item.id"></strong>
                              <span x-text="item.title"></span>
                            </div>
                            <details x-show="item.description" @click.stop style="font-size:.8rem; opacity:.8; margin-top:.25rem;">
                              <summary>description</summary>
                              <p x-text="item.description"></p>
                            </details>
                            <footer>
                              <template x-for="tag in item.tags" :key="tag">
                                <kbd class="tag" x-text="tag"></kbd>
                              </template>
                              <small x-text="'by ' + (item.created_by || '')"></small>
                              <small x-show="item.claimed_by" x-text="'→ ' + (item.claimed_by || '')"></small>
                              <small x-text="relTime(item.updated_at)"></small>
                            </footer>
                          </article>
                        </template>
                      </div>
                      <div class="show-all-btn" @click="showAll[col] = !showAll[col]"
                           x-text="showAll[col] ? 'show fewer' : 'show all ' + columnItems(col).length + ' items'"></div>
                    </div>
                    <p x-show="columnItems(col).length === 0"><small>empty</small></p>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Rigs View -->
      <template x-if="$store.nav.page === 'rigs' && !loading">
        <div>
          <h2>Registered Rigs</h2>
          <template x-if="rigs.length === 0">
            <section style="text-align:center; padding:2rem;">
              <p>No rigs registered.</p>
              <code>opengoose rigs add --id dev-01 --recipe developer --tags rust</code>
            </section>
          </template>
          <figure x-show="rigs.length > 0">
            <table>
              <thead>
                <tr><th>ID</th><th>Type</th><th>Recipe</th><th>Tags</th><th>Trust</th><th>Score</th></tr>
              </thead>
              <tbody>
                <template x-for="rig in rigs" :key="rig.id">
                  <tr class="rig-row" @click="openRigDetail(rig.id)">
                    <td x-text="rig.id"></td>
                    <td x-text="rig.rig_type"></td>
                    <td x-text="rig.recipe || '—'"></td>
                    <td>
                      <template x-for="tag in parseTags(rig.tags)" :key="tag">
                        <kbd class="tag" x-text="tag"></kbd>
                      </template>
                      <span x-show="parseTags(rig.tags).length === 0">—</span>
                    </td>
                    <td><mark x-text="trustLabel(rig.trust_level)" :data-tier="rig.trust_level" :data-tooltip="trustTooltip(rig.trust_level)"></mark></td>
                    <td>
                      <span x-text="rig.trust_score.toFixed(1)"></span>
                      <progress :value="Math.min(50, Math.max(0, rig.trust_score))" max="50" style="width:60px; vertical-align:middle;"></progress>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </figure>
        </div>
      </template>

      <!-- Skills View -->
      <template x-if="$store.nav.page === 'skills' && !loading">
        <div>
          <h2>Skills</h2>

          <div class="stats">
            <hgroup>
              <h2 x-text="skills.length"></h2>
              <p>Total</p>
            </hgroup>
            <hgroup>
              <h2 x-text="skills.filter(s => s.scope === 'installed').length"></h2>
              <p>Installed</p>
            </hgroup>
            <hgroup>
              <h2 x-text="skills.filter(s => s.lifecycle === 'active').length"></h2>
              <p>Active</p>
            </hgroup>
            <hgroup>
              <h2 x-text="skills.filter(s => s.lifecycle === 'dormant').length"></h2>
              <p>Dormant</p>
            </hgroup>
            <hgroup>
              <h2 x-text="skills.filter(s => s.lifecycle === 'archived').length"></h2>
              <p>Archived</p>
            </hgroup>
          </div>

          <template x-if="skills.length === 0">
            <section style="text-align:center; padding:2rem;">
              <p>No skills found.</p>
              <code>opengoose skills add owner/repo</code>
            </section>
          </template>

          <template x-if="skills.length > 0">
            <div>
              <template x-for="group in skillGroups()" :key="group.label">
                <div class="skill-scope-group">
                  <h3>
                    <span x-text="group.label"></span>
                    <small x-text="'(' + group.skills.length + ')'" style="font-weight:400; opacity:.5;"></small>
                  </h3>
                  <div class="skill-cards">
                    <template x-for="skill in group.skills" :key="skill.name">
                      <article class="skill-card" @click="openSkillDetail(skill.name)">
                        <div>
                          <strong x-text="skill.name"></strong>
                          <kbd class="scope" :class="'scope-' + skill.scope" x-text="skill.scope"></kbd>
                          <kbd x-show="skill.lifecycle" class="scope" :class="skill.lifecycle ? 'lifecycle-' + skill.lifecycle : ''" x-text="skill.lifecycle || ''"></kbd>
                        </div>
                        <p style="font-size:.85rem; opacity:.8; margin-top:.25rem;" x-text="skill.description"></p>
                        <template x-if="skill.effectiveness && skill.effectiveness.subsequent_scores.length > 0">
                          <div class="eff-chart" style="position:relative;">
                            <template x-for="(score, i) in skill.effectiveness.subsequent_scores" :key="i">
                              <div class="eff-bar"
                                   :style="'height:' + Math.max(2, score * 24) + 'px; background:' + (score > skill.effectiveness.generation_score ? '#27ae60' : '#e74c3c')"
                                   :data-tooltip="score.toFixed(2)"></div>
                            </template>
                          </div>
                        </template>
                        <footer>
                          <small x-text="skill.scope_level"></small>
                          <template x-if="skill.effectiveness">
                            <small x-text="skill.effectiveness.is_effective === true ? 'effective' : skill.effectiveness.is_effective === false ? 'not effective' : 'measuring...'"
                                   :style="skill.effectiveness.is_effective === true ? 'color:#27ae60' : skill.effectiveness.is_effective === false ? 'color:#e74c3c' : 'opacity:.5'"></small>
                          </template>
                        </footer>
                      </article>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- Skill detail dialog -->
      <template x-teleport="body">
      <dialog :open="skillDetail !== null">
        <article x-show="skillDetail" x-transition.opacity style="max-width:700px; width:90vw;">
          <header>
            <a href="#" @click.prevent="skillDetail = null" aria-label="Close" class="close"></a>
            <h3 x-text="skillDetail?.name || ''"></h3>
          </header>
          <div style="display:flex; gap:.5rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap;">
            <kbd class="scope" :class="skillDetail ? 'scope-' + skillDetail.scope : ''" x-text="skillDetail?.scope"></kbd>
            <small x-text="skillDetail?.scope_level"></small>
          </div>
          <p style="opacity:.8;" x-text="skillDetail?.description"></p>

          <!-- Metadata -->
          <template x-if="skillDetail?.metadata">
            <div style="margin:1rem 0;">
              <h4>Metadata</h4>
              <dl class="skill-meta-grid">
                <dt>Generated from</dt>
                <dd x-text="'#' + (skillDetail?.metadata?.generated_from?.work_item_id || '') + ' — ' + (skillDetail?.metadata?.generated_from?.dimension || '') + ' (' + (skillDetail?.metadata?.generated_from?.score?.toFixed(1) || '') + ')'"></dd>
                <dt>Generated at</dt>
                <dd x-text="skillDetail?.metadata?.generated_at ? new Date(skillDetail.metadata.generated_at).toLocaleString() : ''"></dd>
                <dt>Last included</dt>
                <dd x-text="skillDetail?.metadata?.last_included_at ? new Date(skillDetail.metadata.last_included_at).toLocaleString() : 'never'"></dd>
              </dl>
              <template x-if="skillDetail?.metadata?.effectiveness?.subsequent_scores?.length > 0">
                <div style="margin-top:.75rem;">
                  <h5>Effectiveness</h5>
                  <div class="eff-chart" style="position:relative; height:40px;">
                    <template x-for="(score, i) in skillDetail.metadata.effectiveness.subsequent_scores" :key="i">
                      <div class="eff-bar"
                           :style="'height:' + Math.max(2, score * 40) + 'px; background:' + (score > skillDetail.metadata.generated_from.score ? '#27ae60' : '#e74c3c')"
                           :data-tooltip="score.toFixed(2)"></div>
                    </template>
                  </div>
                  <small style="opacity:.6;" x-text="'Baseline: ' + (skillDetail?.metadata?.generated_from?.score?.toFixed(2) || '')"></small>
                </div>
              </template>
            </div>
          </template>

          <!-- SKILL.md content -->
          <h4>SKILL.md</h4>
          <div class="skill-content-preview" x-text="skillDetail?.content || ''"></div>

          <!-- Actions -->
          <footer style="display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem;">
            <template x-if="skillDetail?.scope_level?.startsWith('rig:')">
              <fieldset role="group" style="margin-bottom:0;">
                <button class="outline" @click="promoteSkill(skillDetail.name, 'project')" :aria-busy="skillActionLoading">Promote to Project</button>
                <button class="outline" @click="promoteSkill(skillDetail.name, 'global')" :aria-busy="skillActionLoading">Promote to Global</button>
              </fieldset>
            </template>
            <button class="outline secondary" @click="confirmDeleteSkill(skillDetail.name)" :aria-busy="skillActionLoading" style="color:var(--color-stuck);">Delete</button>
          </footer>
          <small x-show="skillActionError" x-text="skillActionError" x-transition aria-invalid="true"></small>
        </article>
      </dialog>
      </template>

      <!-- Detail dialog (teleported to body for z-index safety) -->
      <template x-teleport="body">
      <dialog :open="selectedItem !== null">
        <article x-show="selectedItem" x-transition.opacity>
          <header>
            <a href="#" @click.prevent="selectedItem = null" aria-label="Close" class="close"></a>
            <h3 x-text="selectedItem ? '#' + selectedItem.id + ' ' + selectedItem.title : ''"></h3>
          </header>
          <div class="field">
            <label>Status</label>
            <span class="status-dot" :class="selectedItem ? 'dot-' + selectedItem.status.toLowerCase() : ''"></span>
            <span x-text="selectedItem?.status"></span>
            <kbd :data-p="selectedItem?.priority" x-text="selectedItem?.priority" style="margin-left:.5rem;"></kbd>
          </div>
          <div class="field" x-show="selectedItem?.description">
            <label>Description</label>
            <p x-text="selectedItem?.description"></p>
          </div>
          <div class="field">
            <label>Created by</label>
            <span x-text="selectedItem?.created_by"></span>
            <small x-text="relTime(selectedItem?.created_at)"></small>
          </div>
          <div class="field" x-show="selectedItem?.claimed_by">
            <label>Claimed by</label>
            <span x-text="selectedItem?.claimed_by"></span>
          </div>
          <div class="field" x-show="selectedItem?.tags?.length > 0">
            <label>Tags</label>
            <template x-for="tag in (selectedItem?.tags || [])" :key="tag">
              <kbd class="tag" x-text="tag"></kbd>
            </template>
          </div>
          <div class="field">
            <label>Updated</label>
            <span x-text="relTime(selectedItem?.updated_at)"></span>
          </div>
          <template x-if="selectedItem?.status === 'Open'">
            <footer>
              <fieldset role="group">
                <input type="text" x-model="claimRigId" placeholder="rig id" x-ref="claimInput">
                <button @click="claimItem()" :disabled="!claimRigId || claimLoading" :aria-busy="claimLoading">Claim</button>
              </fieldset>
              <small x-show="claimError" x-text="claimError" x-transition aria-invalid="true"></small>
            </footer>
          </template>
        </article>
      </dialog>
      </template>

      <!-- Post dialog (teleported to body for z-index safety) -->
      <template x-teleport="body">
      <dialog :open="showPostModal">
        <article x-show="showPostModal" x-transition.opacity>
          <header>
            <a href="#" @click.prevent="showPostModal = false" aria-label="Close" class="close"></a>
            <h3>Post Work Item</h3>
          </header>
          <label>Title *
            <input type="text" x-model="postForm.title" placeholder="What needs to be done?" x-ref="postTitle" :aria-invalid="postError ? 'true' : null">
          </label>
          <label>Description
            <textarea x-model="postForm.description" placeholder="Details, acceptance criteria..."></textarea>
          </label>
          <label>Priority
            <select x-model="postForm.priority">
              <option value="P0">P0</option>
              <option value="P1" selected>P1</option>
              <option value="P2">P2</option>
            </select>
          </label>
          <label>Posted by
            <input type="text" x-model="postForm.created_by" placeholder="rig id">
          </label>
          <label>Tags (comma-separated)
            <input type="text" x-model="postForm.tagsRaw" placeholder="rust, backend">
          </label>
          <footer>
            <button class="secondary" @click="showPostModal = false">Cancel</button>
            <button @click="submitPost()" :disabled="!postForm.title.trim() || postLoading" :aria-busy="postLoading">Post</button>
          </footer>
          <small x-show="postError" x-text="postError" x-transition aria-invalid="true"></small>
        </article>
      </dialog>
      </template>

      <!-- Rig detail dialog -->
      <template x-teleport="body">
      <dialog :open="rigDetail !== null">
        <article x-show="rigDetail" x-transition.opacity style="max-width:600px; width:90vw;">
          <header>
            <a href="#" @click.prevent="rigDetail = null" aria-label="Close" class="close"></a>
            <h3 x-text="rigDetail?.id || ''"></h3>
          </header>
          <div style="display:flex; gap:1rem; align-items:center; margin-bottom:1rem;">
            <mark x-text="trustLabel(rigDetail?.trust_level)" :data-tier="rigDetail?.trust_level"></mark>
            <span x-text="rigDetail?.rig_type"></span>
            <span x-show="rigDetail?.recipe" x-text="rigDetail?.recipe"></span>
            <template x-for="tag in parseTags(rigDetail?.tags)" :key="tag">
              <kbd class="tag" x-text="tag"></kbd>
            </template>
          </div>
          <div class="dim-scores">
            <div>
              <label>Quality</label>
              <span x-text="rigDetail?.dimensions?.quality?.toFixed(1) || '0.0'"></span>
              <progress :value="Math.min(50, Math.max(0, rigDetail?.dimensions?.quality || 0))" max="50"></progress>
            </div>
            <div>
              <label>Reliability</label>
              <span x-text="rigDetail?.dimensions?.reliability?.toFixed(1) || '0.0'"></span>
              <progress :value="Math.min(50, Math.max(0, rigDetail?.dimensions?.reliability || 0))" max="50"></progress>
            </div>
            <div>
              <label>Helpfulness</label>
              <span x-text="rigDetail?.dimensions?.helpfulness?.toFixed(1) || '0.0'"></span>
              <progress :value="Math.min(50, Math.max(0, rigDetail?.dimensions?.helpfulness || 0))" max="50"></progress>
            </div>
          </div>
          <hr>
          <template x-if="rigDetail?.completed_items?.length > 0">
            <div>
              <h4 x-text="'Completed (' + rigDetail.completed_items.length + ')'"></h4>
              <template x-for="item in rigDetail.completed_items" :key="item.id">
                <div style="padding:.25rem 0; font-size:.85rem;">
                  <kbd :data-p="item.priority" x-text="item.priority" style="font-size:.65rem;"></kbd>
                  <strong x-text="'#' + item.id"></strong>
                  <span x-text="item.title"></span>
                  <small x-text="relTime(item.updated_at)" style="opacity:.6;"></small>
                </div>
              </template>
            </div>
          </template>
          <template x-if="rigDetail?.stamps?.length > 0">
            <div>
              <h4 x-text="'Stamps (' + rigDetail.stamps.length + ')'"></h4>
              <figure>
                <table>
                  <thead><tr><th>Dim</th><th>Score</th><th>Severity</th><th>By</th><th>Item</th><th>When</th></tr></thead>
                  <tbody>
                    <template x-for="s in rigDetail.stamps" :key="s.work_item_id + s.dimension + s.timestamp">
                      <tr>
                        <td x-text="s.dimension"></td>
                        <td x-text="s.score.toFixed(1)"></td>
                        <td x-text="s.severity"></td>
                        <td x-text="s.stamped_by"></td>
                        <td x-text="'#' + s.work_item_id"></td>
                        <td x-text="relTime(s.timestamp)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </figure>
            </div>
          </template>
          <p x-show="!rigDetail?.stamps?.length && !rigDetail?.completed_items?.length" style="opacity:.6; text-align:center;">No stamps or completed items yet.</p>
        </article>
      </dialog>
      </template>
    </main>
  </div>

  <script>
    // Global stores — shared state accessible via $store
    document.addEventListener('alpine:init', () => {
      // Theme — persisted in localStorage
      Alpine.store('theme', {
        mode: localStorage.getItem('theme') || 'dark',
        toggle() {
          this.mode = this.mode === 'dark' ? 'light' : 'dark';
          localStorage.setItem('theme', this.mode);
        }
      });

      // Navigation — synced to URL hash
      Alpine.store('nav', {
        page: location.hash === '#rigs' ? 'rigs' : location.hash === '#skills' ? 'skills' : 'board',
      });

      // Filters — synced to URL params
      const params = new URLSearchParams(location.search);
      Alpine.store('filters', {
        status: params.get('status') || '',
        priority: params.get('priority') || '',
        sort: params.get('sort') || 'priority',
        q: params.get('q') || '',
      });

      // Sync nav → hash
      Alpine.effect(() => {
        const page = Alpine.store('nav').page;
        history.replaceState(null, '', page === 'board' ? syncUrl() : page === 'rigs' ? '#rigs' : '#skills');
      });

      // Sync filters → URL params
      Alpine.effect(() => {
        const f = Alpine.store('filters');
        // Only sync when on board page
        if (Alpine.store('nav').page === 'board') {
          history.replaceState(null, '', syncUrl());
        }
      });
    });

    function syncUrl() {
      const f = Alpine.store('filters');
      const params = new URLSearchParams();
      if (f.status) params.set('status', f.status);
      if (f.priority) params.set('priority', f.priority);
      if (f.sort && f.sort !== 'priority') params.set('sort', f.sort);
      if (f.q) params.set('q', f.q);
      const qs = params.toString();
      return qs ? '?' + qs : location.pathname;
    }

    function dashboard() {
      return {
        items: [],
        rigs: [],
        connected: false,
        loading: true,
        es: null,
        selectedItem: null,
        showAll: {},
        reconnectDelay: 3000,
        showPostModal: false,
        postForm: { title: '', description: '', priority: 'P1', created_by: 'web', tagsRaw: '' },
        postLoading: false,
        postError: '',
        claimRigId: '',
        claimLoading: false,
        claimError: '',
        rigDetail: null,
        skills: [],
        skillDetail: null,
        skillActionLoading: false,
        skillActionError: '',

        async init() {
          await Promise.all([this.fetchBoard(), this.fetchRigs(), this.fetchSkills()]);
          this.loading = false;
          this.connectSSE();

          // Autofocus on modal open
          this.$watch('showPostModal', open => {
            if (open) this.$nextTick(() => this.$refs.postTitle?.focus());
          });
          this.$watch('selectedItem', item => {
            if (item?.status === 'Open') this.$nextTick(() => this.$refs.claimInput?.focus());
            this.claimError = '';
            this.claimRigId = '';
          });
        },

        async fetchBoard() {
          try { this.items = await api('/api/board'); }
          catch (e) { console.error('fetch board failed', e); }
        },

        async fetchRigs() {
          try { this.rigs = await api('/api/rigs'); }
          catch (e) { console.error('fetch rigs failed', e); }
        },

        connectSSE() {
          if (this.es) { this.es.close(); }
          this.es = new EventSource('/api/events');
          this.es.onopen = () => { this.connected = true; this.reconnectDelay = 3000; };
          this.es.onerror = () => {
            this.connected = false;
            this.es.close();
            const delay = this.reconnectDelay;
            this.reconnectDelay = Math.min(delay * 2, 30000);
            setTimeout(() => this.connectSSE(), delay);
          };
          this.es.addEventListener('board_changed', () => {
            this.fetchBoard();
          });
        },

        filteredItems() {
          const f = this.$store.filters;
          const q = f.q.toLowerCase();
          return this.items.filter(i => {
            if (f.status && i.status !== f.status) return false;
            if (f.priority && i.priority !== f.priority) return false;
            if (q) {
              const haystack = (
                i.title + ' ' + (i.description || '') + ' ' +
                (i.tags || []).join(' ') + ' ' +
                (i.created_by || '') + ' ' + (i.claimed_by || '')
              ).toLowerCase();
              if (!haystack.includes(q)) return false;
            }
            return true;
          });
        },

        sortItems(arr) {
          const order = this.$store.filters.sort;
          return [...arr].sort((a, b) => {
            if (order === 'priority') return priorityOrd(a.priority) - priorityOrd(b.priority);
            if (order === 'newest') return new Date(b.created_at) - new Date(a.created_at);
            if (order === 'oldest') return new Date(a.created_at) - new Date(b.created_at);
            if (order === 'alpha') return a.title.localeCompare(b.title);
            return 0;
          });
        },

        countByStatus(status) {
          return this.filteredItems().filter(i => i.status === status).length;
        },

        visibleColumns() {
          const s = this.$store.filters.status;
          if (s) return [s];
          return ['Open', 'Claimed', 'Stuck', 'Done', 'Abandoned'];
        },

        columnItems(col) {
          return this.sortItems(this.filteredItems().filter(i => i.status === col));
        },

        displayItems(col) {
          const all = this.columnItems(col);
          if (col === 'Done' || col === 'Abandoned') {
            return all.slice(0, 10);
          }
          return all;
        },

        parseTags(tagsJson) {
          if (!tagsJson) return [];
          try { return JSON.parse(tagsJson); } catch { return []; }
        },

        async submitPost() {
          this.postError = '';
          this.postLoading = true;
          try {
            const tags = this.postForm.tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
            await api('/api/board', {
              title: this.postForm.title.trim(),
              description: this.postForm.description.trim(),
              priority: this.postForm.priority,
              created_by: this.postForm.created_by.trim() || 'web',
              tags,
            });
            this.showPostModal = false;
            this.postForm = { title: '', description: '', priority: 'P1', created_by: 'web', tagsRaw: '' };
            await this.fetchBoard();
          } catch (e) { this.postError = e.message; }
          this.postLoading = false;
        },

        async claimItem() {
          this.claimError = '';
          this.claimLoading = true;
          try {
            this.selectedItem = await api('/api/board/' + this.selectedItem.id + '/claim', {
              rig_id: this.claimRigId.trim(),
            });
            await this.fetchBoard();
          } catch (e) { this.claimError = e.message; }
          this.claimLoading = false;
        },

        async openRigDetail(rigId) {
          try {
            this.rigDetail = await api('/api/rigs/' + rigId);
          } catch (e) { console.error('fetch rig detail failed', e); }
        },

        async fetchSkills() {
          try { this.skills = await api('/api/skills'); }
          catch (e) { console.error('fetch skills failed', e); }
        },

        skillGroups() {
          const groups = {};
          for (const s of this.skills) {
            const key = s.scope_level;
            if (!groups[key]) groups[key] = { label: key, skills: [] };
            groups[key].skills.push(s);
          }
          // Sort: rig:* first, then project, then global
          return Object.values(groups).sort((a, b) => {
            const order = k => k.startsWith('rig:') ? 0 : k === 'project' ? 1 : 2;
            return order(a.label) - order(b.label);
          });
        },

        async openSkillDetail(name) {
          this.skillActionError = '';
          try {
            this.skillDetail = await api('/api/skills/' + encodeURIComponent(name));
          } catch (e) { console.error('fetch skill detail failed', e); }
        },

        async promoteSkill(name, to) {
          this.skillActionError = '';
          this.skillActionLoading = true;
          try {
            await api('/api/skills/' + encodeURIComponent(name) + '/promote', { to });
            this.skillDetail = null;
            await this.fetchSkills();
          } catch (e) { this.skillActionError = e.message; }
          this.skillActionLoading = false;
        },

        async confirmDeleteSkill(name) {
          if (!confirm('Delete skill "' + name + '"? This cannot be undone.')) return;
          this.skillActionError = '';
          this.skillActionLoading = true;
          try {
            const res = await fetch('/api/skills/' + encodeURIComponent(name), { method: 'DELETE' });
            if (!res.ok) throw new Error('Delete failed (' + res.status + ')');
            this.skillDetail = null;
            await this.fetchSkills();
          } catch (e) { this.skillActionError = e.message; }
          this.skillActionLoading = false;
        },

        trustLabel(level) {
          const labels = { L1: 'Newcomer', 'L1.5': 'Recognized', L2: 'Contributor', 'L2.5': 'Trusted', L3: 'Veteran' };
          return labels[level] || level;
        },

        trustTooltip(level) {
          const labels = { L1: 'Newcomer (<3)', 'L1.5': 'Recognized (≥3)', L2: 'Contributor (≥10)', 'L2.5': 'Trusted (≥25)', L3: 'Veteran (≥50)' };
          return labels[level] || level;
        },

        relTime(iso) {
          if (!iso) return '';
          const diff = Date.now() - new Date(iso).getTime();
          const mins = Math.floor(diff / 60000);
          if (mins < 1) return 'just now';
          if (mins < 60) return mins + 'm ago';
          const hrs = Math.floor(mins / 60);
          if (hrs < 24) return hrs + 'h ago';
          const days = Math.floor(hrs / 24);
          if (days < 30) return days + 'd ago';
          return new Date(iso).toLocaleDateString();
        }
      };
    }

    async function api(path, body) {
      const opts = body
        ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
        : {};
      const res = await fetch(path, opts);
      if (!res.ok) throw new Error(res.status === 404 ? 'Not found' : res.status === 409 ? 'Already claimed' : 'Request failed (' + res.status + ')');
      return res.json();
    }

    function priorityOrd(p) {
      return p === 'P0' ? 0 : p === 'P1' ? 1 : 2;
    }
  </script>
</body>
</html>
