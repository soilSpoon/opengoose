name: git-tools
description: "Git repository inspection and diff tools"
version: "1.0.0"
extensions:
  - name: git-log
    type: stdio
    cmd: git
    args:
      - log
      - "--oneline"
      - "-20"
  - name: git-diff
    type: stdio
    cmd: git
    args:
      - diff
      - "--stat"
  - name: git-status
    type: stdio
    cmd: git
    args:
      - status
      - "--short"
