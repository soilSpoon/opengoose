version: "1.0.0"
title: "full-review"
description: "Performs security, functional, and testing review in sequence."
workflow: chain
agents:
  - profile: security-auditor
    role: "Identify security and risk issues first"
  - profile: reviewer
    role: "Review quality, correctness, and maintainability"
  - profile: tester
    role: "Validate behavior with structured test scenarios"
