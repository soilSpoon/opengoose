version: "1.0.0"
title: "bug-triage"
description: "Routes incidents to triage, implementation, or investigation paths."
workflow: router
agents:
  - profile: bug-triager
    role: "Prioritize and route incoming bug reports"
  - profile: developer
    role: "Handle implementation-heavy bug fixes"
  - profile: researcher
    role: "Deep-dive root cause and related context"
router:
  strategy: content-based
