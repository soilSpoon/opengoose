{% extends "base.html" %}

{% block head_assets %}
  <link rel="stylesheet" href="/assets/styles/error.css">
{% endblock %}

{% block content %}
<section class="error-shell">
  <article class="error-card panel">
    <div class="error-header">
      <span class="error-icon" aria-hidden="true">{{ icon }}</span>
      <div>
        <p class="eyebrow error-eyebrow" style="color: {{ tone_color }};">{{ eyebrow }}</p>
        <h1 class="error-title">{{ title }}</h1>
      </div>
    </div>

    <p class="error-summary">{{ summary }}</p>

    {% if let Some(hint) = hint %}
    <div class="error-hint">
      💡 {{ hint }}
    </div>
    {% endif %}

    <div class="supporting-actions">
      <a class="primary-button" href="{{ retry_href }}">↻ Retry this page</a>
      <a class="secondary-button" href="/">← Return to dashboard</a>
    </div>

    <details class="error-detail">
      <summary>Technical detail</summary>
      <pre><code>{{ detail }}</code></pre>
    </details>
  </article>
</section>
{% endblock %}
