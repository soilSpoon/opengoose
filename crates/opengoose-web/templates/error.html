{% extends "base.html" %}

{% block content %}
<section class="error-shell" style="display: flex; justify-content: center; align-items: flex-start; padding-top: 3rem;">
  <article class="error-card panel" style="max-width: 560px; width: 100%;">

    <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem;">
      <span style="font-size: 2.5rem; line-height: 1;" aria-hidden="true">{{ icon }}</span>
      <div>
        <p class="eyebrow" style="color: {{ tone_color }}; margin-bottom: 0.2rem;">{{ eyebrow }}</p>
        <h1 style="font-size: 1.5rem;">{{ title }}</h1>
      </div>
    </div>

    <p style="color: #a0aec0; line-height: 1.6; margin-bottom: 1.5rem;">{{ summary }}</p>

    {% if let Some(hint) = hint %}
    <div style="
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      color: #a5b4fc;
    ">
      💡 {{ hint }}
    </div>
    {% endif %}

    <div class="supporting-actions" style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
      <a class="primary-button" href="{{ retry_href }}">↻ Retry this page</a>
      <a class="secondary-button" href="/">← Return to dashboard</a>
    </div>

    <details class="error-detail">
      <summary style="
        cursor: pointer;
        font-size: 0.8rem;
        color: #8892a4;
        user-select: none;
        margin-bottom: 0.5rem;
      ">Technical detail</summary>
      <pre style="margin-top: 0.5rem;"><code>{{ detail }}</code></pre>
    </details>

  </article>
</section>
{% endblock %}
