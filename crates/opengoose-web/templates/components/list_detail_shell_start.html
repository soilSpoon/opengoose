<section id="detail-shell" class="detail-shell">
  <aside class="rail-panel panel" data-list-shell data-list-label="{{ list_label }}">
    <div class="list-toolbar" role="search" aria-label="{{ search_aria_label }}">
      <div class="control-row">
        <label class="control-field control-field-search">
          <span>{{ search_label }}</span>
          <input type="search" placeholder="{{ search_placeholder }}" autocomplete="off" spellcheck="false" data-list-search>
        </label>
        <label class="control-field control-field-compact">
          <span>Page size</span>
          <select data-list-page-size>
            <option value="6">6</option>
            <option value="8" selected>8</option>
            <option value="12">12</option>
          </select>
        </label>
      </div>
      <p class="list-status" data-list-status role="status" aria-live="polite"></p>
    </div>
    <p class="empty-hint empty-hint-inline" data-list-empty hidden>{{ empty_hint }}</p>
    <nav class="rail-list" data-list aria-label="{{ nav_label }}">
