<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenGoose</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #f87171;
      --warning: #fb923c;
      --success: #4ade80;
      --radius: 8px;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header.site-header {
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    header.site-header a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
    }

    header.site-header .site-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      padding: 2rem 1.5rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    h1 { font-size: 1.75rem; font-weight: 700; }
    h2 { font-size: 1.25rem; font-weight: 600; }

    .primary-button, .secondary-button {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }

    .primary-button {
      background: var(--accent);
      color: #fff;
    }
    .primary-button:hover { background: var(--accent-hover); }

    .secondary-button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .secondary-button:hover { color: var(--text); border-color: var(--muted); }

    pre, code {
      font-family: var(--mono);
      font-size: 0.85rem;
    }

    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      overflow-x: auto;
    }

    footer.site-footer {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/">OpenGoose</a>
    <span class="site-badge">Dashboard</span>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    OpenGoose &mdash; AI orchestration runtime
  </footer>
</body>
</html>
