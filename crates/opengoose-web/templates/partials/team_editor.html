<section class="detail-card">
  <div class="detail-head">
    <div>
      <p class="eyebrow">Team editor</p>
      <h2>{{ detail.title }}</h2>
      <p>{{ detail.subtitle }}</p>
    </div>
    <span class="chip chip-wrap tone-neutral">{{ detail.source_label }}</span>
  </div>

  {% match detail.notice %}
  {% when Some with (notice) %}
  <div class="notice tone-{{ notice.tone }}">{{ notice.text }}</div>
  {% when None %}
  {% endmatch %}

  <dl class="meta-grid">
    <div class="meta-item">
      <dt>Workflow</dt>
      <dd>{{ detail.workflow_label }}</dd>
    </div>
    <div class="meta-item">
      <dt>Members</dt>
      <dd>{{ detail.members_text }}</dd>
    </div>
  </dl>

  <form class="editor-form" method="post" action="/teams">
    <input type="hidden" name="original_name" value="{{ detail.original_name }}">
    <label for="yaml-editor">Team YAML</label>
    <textarea id="yaml-editor" name="yaml" spellcheck="false">{{ detail.yaml }}</textarea>
    <button class="primary-button" type="submit">Save team definition</button>
  </form>
</section>
