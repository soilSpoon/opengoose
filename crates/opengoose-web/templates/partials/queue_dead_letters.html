<div class="timeline">
  <h3>Dead letters</h3>
  {% for message in detail.dead_letters %}
  <article class="timeline-item">
    <div>
      <p class="rail-title">{{ message.sender }} → {{ message.recipient }}</p>
      <p class="rail-preview">{{ message.content }}</p>
    </div>
    <span class="chip tone-{{ message.status_tone }}">{{ message.status_label }}</span>
  </article>
  {% endfor %}
</div>
