<form class="editor-form" method="post" action="/triggers">
  <input type="hidden" name="intent" value="update">
  <input type="hidden" name="original_name" value="{{ detail.name }}">
  <h3>Edit trigger</h3>

  {% let type_id = "edit-trigger-type" %}
  {% let selected_type = detail.trigger_type.as_str() %}
  {% include "partials/triggers/type_options.html" %}

  <label for="edit-trigger-team">Team name</label>
  <input
    id="edit-trigger-team"
    name="team_name"
    type="text"
    value="{{ detail.team_name }}"
    autocomplete="off"
    spellcheck="false"
  >

  <label for="edit-trigger-condition">Condition JSON</label>
  <textarea id="edit-trigger-condition" name="condition_json" spellcheck="false">{{ detail.condition_json }}</textarea>

  <label for="edit-trigger-input">Default input</label>
  <textarea id="edit-trigger-input" name="input" spellcheck="false">{{ detail.input }}</textarea>

  <div class="live-chip-row">
    <button class="primary-button" type="submit">Save changes</button>
  </div>
</form>
