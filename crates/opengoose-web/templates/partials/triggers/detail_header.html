<div class="detail-head">
  <div>
    <p class="eyebrow">Trigger detail</p>
    <h2>{{ detail.name }}</h2>
    <p>{{ detail.trigger_type }} · {{ detail.team_name }}</p>
  </div>
  <div class="live-chip-row">
    <span class="chip tone-{{ detail.status_tone }}">{{ detail.status_label }}</span>
    <span class="chip tone-neutral">{{ detail.fire_count }} fire(s)</span>
  </div>
</div>
