<article class="panel">
  {% include "components/panel_head.html" %}
  <div class="segment-chart">
    {% for segment in segments %}
    <div class="segment-pill tone-{{ segment.tone }}" style="width: {{ segment.width }}%">
      <span>{{ segment.label }}</span>
      <strong>{{ segment.value }}</strong>
    </div>
    {% endfor %}
  </div>
</article>
