<tr
  data-table-row
  data-search="{{ message.sender }} {{ message.recipient }} {{ message.kind }} {{ message.status_label }} {{ message.content }} {{ message.error }}"
  data-status="{{ message.status_label }}"
  data-sort-created="{{ message.created_at }}"
  data-sort-sender="{{ message.sender }}"
  data-sort-recipient="{{ message.recipient }}"
  data-sort-retries="{{ message.retry_text }}"
  tabindex="0"
>
  <td>{{ message.sender }}</td>
  <td>{{ message.recipient }}</td>
  <td>{{ message.kind }}</td>
  <td><span class="chip tone-{{ message.status_tone }}">{{ message.status_label }}</span></td>
  <td>{{ message.retry_text }}</td>
  <td>{{ message.created_at }}</td>
</tr>
<tr class="table-detail" data-table-detail>
  <td colspan="6">
    <strong>Payload:</strong> {{ message.content }}
    {% if message.error != "" %}
    <br><strong>Error:</strong> {{ message.error }}
    {% endif %}
  </td>
</tr>
