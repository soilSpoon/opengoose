<section class="detail-card">
  <div class="detail-head">
    <div>
      <p class="eyebrow">Triggers</p>
      <h2>No triggers configured</h2>
      <p>Create your first event-driven trigger to fire workflow runs automatically.</p>
    </div>
  </div>

  {% include "partials/trigger_detail/notice.html" %}

  <form class="editor-form" id="trigger-create-form" method="post" action="/triggers">
    <input type="hidden" name="intent" value="create">
    <h3>Create trigger</h3>

    <label for="trigger-name">Name</label>
    <input id="trigger-name" name="name" type="text" placeholder="on-pr-open" required>

    <label for="trigger-type">Type</label>
    <select id="trigger-type" name="trigger_type">
      <option value="webhook_received">Webhook</option>
      <option value="file_watch">File watch</option>
      <option value="cron">Cron</option>
      <option value="message_received">Message received</option>
    </select>

    <label for="trigger-team">Team name</label>
    <input id="trigger-team" name="team_name" type="text" placeholder="code-review" required>

    <label for="trigger-condition">Condition JSON</label>
    <textarea id="trigger-condition" name="condition_json" spellcheck="false">{}</textarea>

    <label for="trigger-input">Default input</label>
    <textarea id="trigger-input" name="input" spellcheck="false" placeholder="Optional run input passed to the workflow"></textarea>

    <div class="live-chip-row">
      <button class="primary-button" type="submit">Create trigger</button>
    </div>
  </form>
</section>
