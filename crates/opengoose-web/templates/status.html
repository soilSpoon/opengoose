{% extends "base.html" %}

{% block content %}
<section
  data-signals="{streamState: 'connecting'}"
  data-computed:stream-status-label="$streamState === 'live' ? 'SSE live' : ($streamState === 'retrying' ? 'Reconnecting' : ($streamState === 'degraded' ? 'Stream degraded' : 'Connecting'))"
  data-computed:stream-status-tone="$streamState === 'live' ? 'success' : ($streamState === 'degraded' ? 'rose' : 'amber')"
  data-on:datastar-fetch="evt.detail.type === 'started' ? ($streamState = 'live') : (evt.detail.type === 'retrying' ? ($streamState = 'retrying') : ((evt.detail.type === 'error' || evt.detail.type === 'retries-failed') ? ($streamState = 'degraded') : null))"
  data-init="@get('/status/events', { openWhenHidden: true, retry: 'always' })"
>
  {% include "partials/status_page_intro.html" %}

  <div class="monitor-stack">
    <div id="status-live">{{ live_html|safe }}</div>
  </div>
</section>
{% endblock %}
