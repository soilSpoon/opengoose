services:
  opengoose:
    build:
      context: .
      dockerfile: Dockerfile
    image: opengoose:local
    environment:
      HOME: ${OPENGOOSE_HOME:-/var/lib/opengoose}
      OPENGOOSE_HOST: ${OPENGOOSE_HOST:-0.0.0.0}
      OPENGOOSE_PORT: ${OPENGOOSE_PORT:-8080}
      OPENGOOSE_DB_PATH: ${OPENGOOSE_DB_PATH:-/var/lib/opengoose/.opengoose/sessions.db}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${OPENGOOSE_PORT:-8080}:${OPENGOOSE_PORT:-8080}"
    volumes:
      - opengoose-data:${OPENGOOSE_HOME:-/var/lib/opengoose}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${OPENGOOSE_PORT:-8080}/api/health/live >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  opengoose-data:
