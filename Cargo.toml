[workspace]
resolver = "2"
members = [
    "crates/opengoose-types",
    "crates/opengoose-core",
    "crates/opengoose-discord",
    "crates/opengoose-tui",
    "crates/opengoose-secrets",
    "crates/opengoose-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
opengoose-types = { path = "crates/opengoose-types" }
opengoose-core = { path = "crates/opengoose-core" }
opengoose-discord = { path = "crates/opengoose-discord" }
opengoose-tui = { path = "crates/opengoose-tui" }
opengoose-secrets = { path = "crates/opengoose-secrets" }

keyring = { version = "3", features = ["sync-secret-service", "apple-native", "windows-native"] }
zeroize = { version = "1", features = ["derive"] }
dirs = "6"
toml = "1"
clap = { version = "4", features = ["derive"] }
rpassword = "7"

ratatui = "0.30"
crossterm = "0.29"
nucleo-matcher = "0.3"

async-trait = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dashmap = "6"
thiserror = "2"
tokio-util = "0.7"
